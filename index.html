<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aura Finance | Contextual Clarity</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0A0A0B;
            --surface: #121214;
            --surface-accent: #1C1C1E;
            --accent: #F59E0B; /* Amber Gold */
            --text-main: #FFFFFF;
            --text-dim: #94A3B8;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.08);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background-color: var(--bg); 
            color: var(--text-main); 
            font-family: 'Inter', sans-serif; 
            min-height: 100vh;
            display: flex;
            justify-content: center;
        }

        .app-shell {
            width: 100%;
            max-width: 480px;
            padding: 24px;
            padding-bottom: 100px;
        }

        /* Header & Health Score */
        header { margin-bottom: 32px; padding-top: 20px; }
        .nav-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
        .logo { font-size: 18px; font-weight: 700; letter-spacing: -0.5px; color: var(--accent); }
        
        .health-card {
            background: linear-gradient(180deg, var(--surface-accent) 0%, var(--surface) 100%);
            border: 1px solid var(--border);
            border-radius: 32px;
            padding: 32px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        .health-label { font-size: 12px; text-transform: uppercase; letter-spacing: 2px; color: var(--text-dim); margin-bottom: 8px; }
        .health-status { font-size: 42px; font-weight: 700; color: var(--text-main); }
        .health-subtext { font-size: 14px; color: var(--accent); margin-top: 8px; font-weight: 500; }

        /* Feature: Proactive Insights (Horizontal Scroll) */
        .section-label { font-size: 13px; font-weight: 600; color: var(--text-dim); margin: 24px 0 16px; display: flex; justify-content: space-between; }
        .insight-scroll { display: flex; gap: 12px; overflow-x: auto; padding-bottom: 8px; scrollbar-width: none; }
        .insight-scroll::-webkit-scrollbar { display: none; }
        .mini-card {
            min-width: 160px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 16px;
        }
        .mini-emoji { font-size: 20px; margin-bottom: 12px; }
        .mini-title { font-size: 13px; font-weight: 600; margin-bottom: 4px; }
        .mini-val { font-size: 12px; color: var(--text-dim); }

        /* Feature: The Concierge Input */
        .concierge-box {
            background: var(--surface-accent);
            border: 1px solid var(--accent);
            border-radius: 24px;
            padding: 20px;
            margin-top: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }
        textarea {
            width: 100%;
            background: transparent;
            border: none;
            color: white;
            font-size: 16px;
            outline: none;
            resize: none;
            height: 60px;
            font-family: inherit;
        }
        .btn-aura {
            background: var(--accent);
            color: black;
            border: none;
            width: 100%;
            padding: 14px;
            border-radius: 14px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 12px;
        }

        /* The Output: Clarity Card */
        #results { margin-top: 24px; display: none; }
        .clarity-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 28px;
            padding: 24px;
            border-top: 4px solid var(--accent);
        }
        .clarity-title { font-size: 20px; font-weight: 600; margin-bottom: 12px; line-height: 1.4; }
        .clarity-data { font-size: 13px; color: var(--text-dim); background: var(--glass); padding: 12px; border-radius: 12px; margin-bottom: 20px; }
        .tweak-section { border-left: 2px solid var(--accent); padding-left: 16px; }
        .tweak-head { font-size: 11px; text-transform: uppercase; color: var(--accent); font-weight: 700; margin-bottom: 4px; }
        .tweak-body { font-size: 14px; color: var(--text-main); font-weight: 500; }

        /* Loading */
        #loading { display: none; text-align: center; padding: 40px; }
        .pulse { width: 12px; height: 12px; background: var(--accent); border-radius: 50%; display: inline-block; animation: pulse 1s infinite alternate; }
        @keyframes pulse { from { opacity: 0.3; transform: scale(0.8); } to { opacity: 1; transform: scale(1.2); } }

        .settings { position: fixed; bottom: 24px; right: 24px; background: var(--surface-accent); width: 44px; height: 44px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; border: 1px solid var(--border); }
    </style>
</head>
<body>

    <div class="app-shell">
        <header>
            <div class="nav-top">
                <div class="logo">AURA FINANCE</div>
                <div style="font-size: 12px; color: var(--text-dim);">Sethuram V.</div>
            </div>
            
            <div class="health-card">
                <div class="health-label">Your Aura Score</div>
                <div class="health-status">Calm</div>
                <div class="health-subtext">Trajectory: +12% Savings</div>
            </div>
        </header>

        <div class="section-label">PROACTIVE FLAGS <span>View All</span></div>
        <div class="insight-scroll">
            <div class="mini-card">
                <div class="mini-emoji">💸</div>
                <div class="mini-title">Netflix Duo</div>
                <div class="mini-val">Unused 22 Days</div>
            </div>
            <div class="mini-card">
                <div class="mini-emoji">☕</div>
                <div class="mini-title">Daily Chai</div>
                <div class="mini-val">Up 14% this week</div>
            </div>
            <div class="mini-card">
                <div class="mini-emoji">🚗</div>
                <div class="mini-title">Uber Spikes</div>
                <div class="mini-val">3 Surge payments</div>
            </div>
        </div>

        <div class="section-label">FINANCIAL CONCIERGE</div>
        <div class="concierge-box" id="input-area">
            <textarea id="userInput" placeholder="Ask Aura: 'Am I spending too much on Swiggy?' or 'Scan my subscriptions'"></textarea>
            <button class="btn-aura" onclick="getAura()">Analyze Intent</button>
        </div>

        <div id="loading">
            <div class="pulse"></div>
            <p style="margin-top: 12px; font-size: 13px; color: var(--text-dim)">Filtering transactional noise...</p>
        </div>

        <div id="results">
            </div>
    </div>

    <div class="settings" onclick="setKey()">⚙️</div>

    <script>
        function setKey() {
            const key = prompt("Enter Groq API Key:");
            if(key) localStorage.setItem('groq_key', key);
        }

        async function getAura() {
            const apiKey = localStorage.getItem('groq_key');
            if(!apiKey) return alert("Click settings (gear) to add your Free Groq API Key first.");

            const input = document.getElementById('userInput').value;
            if(!input) return;

            document.getElementById('input-area').style.display = 'none';
            document.getElementById('loading').style.display = 'block';

            try {
                const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${apiKey}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        model: "llama-3.3-70b-versatile",
                        messages: [{
                            role: "system",
                            content: "You are Aura Finance. Return JSON only: {insight: 'bold one-liner', details: 'specific breakdown of transactions', tweak: 'behavioral nudge'}"
                        }, { role: "user", content: input }],
                        response_format: { type: "json_object" }
                    })
                });

                const data = await response.json();
                const res = JSON.parse(data.choices[0].message.content);

                document.getElementById('loading').style.display = 'none';
                document.getElementById('results').style.display = 'block';
                document.getElementById('results').innerHTML = `
                    <div class="clarity-card">
                        <div class="clarity-title">${res.insight}</div>
                        <div class="clarity-data">${res.details}</div>
                        <div class="tweak-section">
                            <div class="tweak-head">The Aura Tweak</div>
                            <div class="tweak-body">${res.tweak}</div>
                        </div>
                        <button class="btn-aura" style="background: transparent; color: var(--text-dim); border: 1px solid var(--border); margin-top: 24px;" onclick="location.reload()">Reset Compass</button>
                    </div>
                `;
            } catch (e) {
                alert("Check your key or connection.");
                location.reload();
            }
        }
    </script>
</body>
</html>
