<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aura Finance | Contextual Clarity</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0A0A0B;
            --surface: #121214;
            --surface-accent: #1C1C1E;
            --accent: #F59E0B;
            --text-main: #FFFFFF;
            --text-dim: #94A3B8;
            --border: rgba(255, 255, 255, 0.08);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background-color: var(--bg); 
            color: var(--text-main); 
            font-family: 'Inter', sans-serif; 
            min-height: 100vh;
            display: flex; justify-content: center;
        }

        .app-shell { width: 100%; max-width: 480px; padding: 24px; padding-bottom: 100px; }

        header { margin-bottom: 32px; padding-top: 20px; display: flex; justify-content: space-between; align-items: center;}
        .logo { font-size: 18px; font-weight: 700; color: var(--accent); letter-spacing: -0.5px; }
        
        /* Dashboard Stats */
        .aura-score-box {
            background: linear-gradient(180deg, #1C1C1E 0%, #121214 100%);
            border: 1px solid var(--border);
            border-radius: 28px;
            padding: 24px;
            text-align: center;
            margin-bottom: 24px;
        }
        .score-val { font-size: 36px; font-weight: 700; }
        .score-label { font-size: 12px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px;}

        /* Feature: File Drop Zone */
        .upload-zone {
            border: 2px dashed var(--border);
            border-radius: 20px;
            padding: 30px;
            text-align: center;
            margin-bottom: 24px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .upload-zone:hover { border-color: var(--accent); background: rgba(245, 158, 11, 0.02); }
        .upload-zone p { font-size: 13px; color: var(--text-dim); }

        /* Input Area */
        .concierge-input {
            background: var(--surface-accent);
            border-radius: 24px;
            padding: 20px;
            border: 1px solid var(--border);
        }
        textarea {
            width: 100%; background: transparent; border: none; color: white;
            font-size: 16px; outline: none; resize: none; height: 70px; font-family: inherit;
        }
        .btn-aura {
            background: var(--accent); color: black; border: none; width: 100%;
            padding: 14px; border-radius: 12px; font-weight: 700; cursor: pointer; margin-top: 10px;
        }

        /* Results Display */
        #results { margin-top: 24px; display: none; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .insight-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 24px;
            border-left: 4px solid var(--accent);
        }
        .insight-title { font-size: 18px; font-weight: 600; margin-bottom: 10px; }
        .insight-body { font-size: 14px; color: var(--text-dim); margin-bottom: 20px; line-height: 1.5; }
        .tweak-label { font-size: 11px; font-weight: 800; color: var(--accent); text-transform: uppercase; margin-bottom: 4px;}
        .tweak-text { font-size: 14px; color: white; font-weight: 500; }

        /* UI Helpers */
        #loading { display: none; text-align: center; padding: 30px; }
        .settings { position: fixed; bottom: 24px; right: 24px; background: var(--surface-accent); width: 44px; height: 44px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; border: 1px solid var(--border); }
    </style>
</head>
<body>

    <div class="app-shell">
        <header>
            <div class="logo">AURA FINANCE</div>
            <div style="font-size: 12px; color: var(--text-dim)">v1.0 Prototype</div>
        </header>

        <div class="aura-score-box">
            <div class="score-label">Current State</div>
            <div class="score-val">Calm</div>
            <div style="color: var(--accent); font-size: 13px; margin-top: 8px;">No major anomalies detected</div>
        </div>

        <div class="upload-zone" onclick="simulateUpload()">
            <div style="font-size: 24px; margin-bottom: 8px;">📄</div>
            <p id="uploadText">Drop bank statement (PDF/CSV) to analyze</p>
        </div>

        <div class="concierge-input" id="inputArea">
            <textarea id="userInput" placeholder="Ask Aura: 'What are my unused subscriptions?' or 'Review my weekend spending'"></textarea>
            <button class="btn-aura" onclick="processAura()">Generate Clarity</button>
        </div>

        <div id="loading">
            <p style="color: var(--accent)">✨ Aura is reasoning...</p>
        </div>

        <div id="results">
            <div class="insight-card" id="cardContent"></div>
            <button class="btn-aura" style="background: transparent; color: var(--text-dim); border: 1px solid var(--border); margin-top: 20px;" onclick="location.reload()">Start New Scan</button>
        </div>
    </div>

    <div class="settings" onclick="setKey()">⚙️</div>

    <script>
        function setKey() {
            const key = prompt("Enter Groq API Key:");
            if(key) localStorage.setItem('groq_key', key);
        }

        function simulateUpload() {
            document.getElementById('uploadText').innerText = "statement_may_2024.csv uploaded ✓";
            document.getElementById('userInput').value = "I've uploaded my statement. Analyze my lifestyle inflation and subscriptions.";
        }

        async function processAura() {
            const apiKey = localStorage.getItem('groq_key');
            if(!apiKey) return alert("Please set your Groq Key via the gear icon.");
            
            const input = document.getElementById('userInput').value;
            document.getElementById('inputArea').style.display = 'none';
            document.getElementById('loading').style.display = 'block';

            try {
                const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${apiKey}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        model: "llama-3.3-70b-versatile",
                        messages: [{
                            role: "system",
                            content: "You are Aura Finance. Provide a JSON response: {title: 'bold insight', body: '2-3 sentences of analysis', tweak: 'one actionable behavioral suggestion'}"
                        }, { role: "user", content: input }],
                        response_format: { type: "json_object" }
                    })
                });

                const data = await response.json();
                const res = JSON.parse(data.choices[0].message.content);

                document.getElementById('loading').style.display = 'none';
                document.getElementById('results').style.display = 'block';
                document.getElementById('cardContent').innerHTML = `
                    <div class="insight-title">${res.title}</div>
                    <div class="insight-body">${res.body}</div>
                    <div class="tweak-label">Behavioral Tweak</div>
                    <div class="tweak-text">${res.tweak}</div>
                `;
            } catch (e) {
                alert("Error connecting to AI.");
                location.reload();
            }
        }
    </script>
</body>
</html>
