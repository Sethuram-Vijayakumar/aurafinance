<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aura Finance | Contextual Clarity</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0D0D0E;
            --card-bg: #161618;
            --accent: #F59E0B; /* Amber Gold */
            --text-main: #FFFFFF;
            --text-dim: #94A3B8;
            --border: #27272A;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background-color: var(--bg); 
            color: var(--text-main); 
            font-family: 'Inter', sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            min-height: 100vh;
            padding: 20px;
        }

        header { width: 100%; max-width: 500px; padding: 40px 0; text-align: center; }
        .logo { font-size: 24px; font-weight: 700; letter-spacing: -1px; color: var(--accent); }
        .tagline { color: var(--text-dim); font-size: 14px; margin-top: 8px; }

        .container { width: 100%; max-width: 500px; }

        /* Input Area */
        .input-box {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 24px;
            margin-bottom: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        textarea {
            width: 100%;
            background: transparent;
            border: none;
            color: white;
            font-size: 18px;
            outline: none;
            resize: none;
            height: 100px;
            font-family: inherit;
        }

        .btn-primary {
            background: var(--accent);
            color: black;
            border: none;
            width: 100%;
            padding: 16px;
            border-radius: 14px;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .btn-primary:active { transform: scale(0.98); }

        /* Results - The Clarity Card */
        #results { margin-top: 20px; display: none; }
        .clarity-card {
            background: linear-gradient(145deg, #1c1c1e, #161618);
            border: 1px solid var(--border);
            border-radius: 28px;
            padding: 32px;
            position: relative;
            overflow: hidden;
        }

        .clarity-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 4px;
            background: var(--accent);
        }

        .insight-text { font-size: 22px; font-weight: 600; line-height: 1.4; margin-bottom: 16px; }
        .context-pill {
            display: inline-block;
            background: rgba(245, 158, 11, 0.1);
            color: var(--accent);
            padding: 6px 12px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 24px;
        }

        .tweak-box {
            background: rgba(255,255,255,0.03);
            border-left: 3px solid var(--accent);
            padding: 16px;
            border-radius: 0 12px 12px 0;
        }

        .tweak-label { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: var(--text-dim); margin-bottom: 4px; }
        .tweak-content { font-size: 15px; color: var(--text-main); font-weight: 500; }

        /* Loading */
        #loading { display: none; text-align: center; padding: 40px; }
        .spinner { width: 30px; height: 30px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 20px; }
        @keyframes spin { to { transform: rotate(360deg); } }

        .settings-icon { position: fixed; bottom: 20px; right: 20px; cursor: pointer; opacity: 0.5; }
    </style>
</head>
<body>

    <header>
        <div class="logo">AURA FINANCE</div>
        <p class="tagline">Translating transactional noise into calm.</p>
    </header>

    <div class="container">
        <div class="input-box" id="input-container">
            <textarea id="userInput" placeholder="E.g. How much did I spend on weekend deliveries this month?"></textarea>
            <button class="btn-primary" onclick="getAuraInsight()">Get Clarity</button>
        </div>

        <div id="loading">
            <div class="spinner"></div>
            <p id="loadingText" style="color: var(--text-dim)">Analyzing your trajectory...</p>
        </div>

        <div id="results">
            </div>
    </div>

    <div class="settings-icon" onclick="setKey()">⚙️</div>

    <script>
        function setKey() {
            const key = prompt("Enter Groq API Key:");
            if(key) localStorage.setItem('groq_key', key);
        }

        async function getAuraInsight() {
            const apiKey = localStorage.getItem('groq_key');
            if(!apiKey) return alert("Please set API key via gear icon.");

            const input = document.getElementById('userInput').value;
            if(!input) return;

            document.getElementById('input-container').style.display = 'none';
            document.getElementById('loading').style.display = 'block';

            try {
                const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${apiKey}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        model: "llama-3.3-70b-versatile",
                        messages: [{
                            role: "system",
                            content: "You are Aura Finance. You translate messy financial data into calm, contextual insights. User asks a question about their spending. You return a JSON object with: {insight: 'A bold, empathetic one-liner about the spending pattern', context: 'A short explanation with a specific fake stat to prove the point', tweak: 'One specific, gentle behavioral suggestion to save money'}. Keep the tone professional but warm."
                        }, {
                            role: "user",
                            content: input
                        }],
                        response_format: { type: "json_object" }
                    })
                });

                const data = await response.json();
                const res = JSON.parse(data.choices[0].message.content);

                document.getElementById('loading').style.display = 'none';
                document.getElementById('results').style.display = 'block';
                document.getElementById('results').innerHTML = `
                    <div class="clarity-card">
                        <div class="insight-text">${res.insight}</div>
                        <div class="context-pill">ANALYSIS: ${res.context}</div>
                        <div class="tweak-box">
                            <div class="tweak-label">Aura Tweak</div>
                            <div class="tweak-content">${res.tweak}</div>
                        </div>
                        <button class="btn-primary" style="margin-top:24px; background: transparent; border: 1px solid var(--border); color: white;" onclick="location.reload()">Start Over</button>
                    </div>
                `;
            } catch (e) {
                alert("Error. Check API Key.");
                location.reload();
            }
        }
    </script>
</body>
</html>
